<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="../images/MGlogo.png">
<title>Meta Achievers Studio — Projects</title>
<style>
  :root{
    --ink:#0e0f0c;
    --bone:#f2ede2;
    --moss:#3c5a40;
    --signal:#d9ff5b;
    --rust:#b5512e;
    --line: rgba(242,237,226,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--bone);
    font-family:'Iosevka','JetBrains Mono',ui-monospace,monospace;
    overflow-x:hidden;
  }
  @font-face{
    font-family:'DisplayFace';
    src:local('Georgia');
  }
  h1,h2,h3{
    font-family: Georgia, 'Iowan Old Style', serif;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }

  /* ===================== HERO SLIDESHOW ===================== */
  .hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
  }
  .slide{
    position:absolute;
    inset:0;
    opacity:0;
    transition:opacity 1.1s ease;
    background-size:cover;
    background-position:center;
  }
  .slide.active{ opacity:1; z-index:2; }
  .slide::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(14,15,12,0.05) 0%, rgba(14,15,12,0.15) 45%, rgba(14,15,12,0.92) 100%);
  }

  .hero-top{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:28px 48px;
    z-index:10;
  }
  .brand{
    font-family: Georgia, serif;
    font-size:20px;
    letter-spacing:0.04em;
    color:var(--bone);
  }
  .brand span{ color:var(--signal); }
  .hero-nav{
    display:flex; gap:24px;
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:rgba(242,237,226,0.65);
  }

  .hero-overlay{
    position:absolute;
    left:0; right:0; bottom:0;
    z-index:10;
    padding:0 48px 56px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:40px;
  }
  .hero-info{ max-width:640px; }
  .hero-eyebrow{
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--signal);
    margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
  }
  .hero-eyebrow .num{ color:rgba(242,237,226,0.5); }
  .hero-title{
    font-size:clamp(40px,6vw,76px);
    line-height:0.98;
    margin-bottom:14px;
  }
  .hero-desc{
    font-size:15px;
    line-height:1.55;
    color:rgba(242,237,226,0.78);
    max-width:480px;
    margin-bottom:22px;
  }
  .play-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:var(--signal);
    color:var(--ink);
    text-decoration:none;
    padding:13px 22px;
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    font-weight:700;
    border-radius:2px;
    transition:transform .25s ease, background .25s ease;
  }
  .play-btn:hover{ transform:translateY(-2px); background:#eaffa0; }
  .play-btn svg{ width:14px; height:14px; }

  .hero-dots{
    display:flex;
    flex-direction:column;
    gap:10px;
    align-items:flex-end;
  }
  .dot-row{ display:flex; gap:8px; }
  .dot{
    width:34px; height:3px;
    background:rgba(242,237,226,0.25);
    position:relative;
    overflow:hidden;
    cursor:pointer;
  }
  .dot .fill{
    position:absolute; left:0; top:0; bottom:0; width:0%;
    background:var(--signal);
  }
  .dot.active .fill{ animation: fillBar 5s linear forwards; }
  @keyframes fillBar{ from{width:0%;} to{width:100%;} }
  .dot-label{
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:rgba(242,237,226,0.55);
  }
  nav{
    position:fixed;top:0;left:0;right:0;z-index:1000;
    display:flex;align-items:center;justify-content:space-between;
    padding:1.4rem 2.5rem;
    background:linear-gradient(to bottom,rgba(14,15,12,0.95),transparent);
    transition:background 0.3s;
  }
  nav.solid{background:rgba(14,15,12,0.98);border-bottom:1px solid rgba(242,237,226,0.12);}
  .nav-logo{
    font-family:Georgia, serif;
    font-size:1.35rem;letter-spacing:0.12em;
    color:var(--bone);text-decoration:none;
  }
  .nav-logo span{color:var(--signal);}
  .nav-links{display:flex;gap:2rem;list-style:none;margin:0;padding:0;}
  .nav-links a{
    font-size:0.8rem;font-weight:600;
    letter-spacing:0.18em;text-transform:uppercase;text-decoration:none;
    color:rgba(242,237,226,0.72);transition:color 0.2s;
  }
  .nav-links a:hover{color:var(--signal);}
  .nav-cta{
    font-size:0.75rem;font-weight:700;
    letter-spacing:0.18em;text-transform:uppercase;text-decoration:none;
    color:var(--ink);background:var(--signal);
    padding:0.55rem 1.25rem;border-radius:2px;
    transition:background 0.2s,transform 0.15s;
  }
  .nav-cta:hover{background:#eaffa0;transform:translateY(-1px);}

  .scroll-cue{
    position:absolute;
    left:50%; bottom:18px;
    transform:translateX(-50%);
    z-index:10;
    font-size:10px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:rgba(242,237,226,0.45);
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .scroll-cue::after{
    content:'';
    width:1px; height:26px;
    background:linear-gradient(180deg, rgba(242,237,226,0.6), transparent);
    animation: cueMove 1.8s ease-in-out infinite;
  }
  @keyframes cueMove{ 0%,100%{opacity:0.3;} 50%{opacity:1;} }

  @media (max-width:720px){
    .hero-top{ padding:20px 22px; }
    .hero-nav{ display:none; }
    .hero-overlay{ padding:0 22px 36px; flex-direction:column; align-items:flex-start; gap:18px; }
    .hero-dots{ width:100%; align-items:flex-start; }
    .dot-row{ width:100%; }
    .dot{ flex:1; }
  }

  /* ===================== GRID SECTION ===================== */
  .archive{
    padding:70px 48px 100px;
    background:var(--ink);
  }
  .archive-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom:1px solid var(--line);
    padding-bottom:22px;
    margin-bottom:36px;
    flex-wrap:wrap;
    gap:14px;
  }
  .archive-head h2{
    font-size:clamp(26px,3.4vw,38px);
  }
  .archive-count{
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:rgba(242,237,226,0.5);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:2px;
    background:var(--line);
  }
  .card{
    position:relative;
    aspect-ratio:1/1;
    background:var(--ink);
    overflow:hidden;
    cursor:pointer;
    display:block;
    text-decoration:none;
    color:inherit;
  }
  .card img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transition:transform .55s ease, filter .55s ease;
    filter:saturate(0.85);
  }
  .card:hover img{
    transform:scale(1.06);
    filter:saturate(1.1);
  }
  .card-shade{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(14,15,12,0) 30%, rgba(14,15,12,0.94) 100%);
  }
  .card-info{
    position:absolute; left:0; right:0; bottom:0;
    padding:16px;
    transform:translateY(8px);
    transition:transform .35s ease;
  }
  .card-tag{
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--signal);
    margin-bottom:6px;
    opacity:0;
    transition:opacity .35s ease;
  }
  .card:hover .card-tag{ opacity:1; }
  .card-title{
    font-family:Georgia, serif;
    font-size:17px;
    margin-bottom:4px;
  }
  .card-desc{
    font-size:11.5px;
    line-height:1.4;
    color:rgba(242,237,226,0.7);
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:max-height .35s ease, opacity .35s ease;
  }
  .card:hover .card-desc{
    max-height:60px;
    opacity:1;
  }
  .card-cta{
    margin-top:8px;
    display:flex;
    align-items:center;
    gap:6px;
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--bone);
    opacity:0;
    transition:opacity .35s ease;
  }
  .card:hover .card-cta{ opacity:0.9; }
  .card-cta svg{ width:10px; height:10px; }

  @media (max-width:1100px){
    .grid{ grid-template-columns:repeat(3,1fr); }
  }
  @media (max-width:760px){
    .archive{ padding:50px 20px 70px; }
    .grid{ grid-template-columns:repeat(2,1fr); }
    .card-desc{ display:none; }
  }

  footer{
    padding:26px 48px 40px;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:rgba(242,237,226,0.35);
    text-align:center;
  }
</style>
</head>
<body>

<!-- ============ HERO SLIDESHOW ============ -->
<nav id="nav">
  <a class="nav-logo" href="../">META<span>ACHIEVERS</span></a>
  <ul class="nav-links">
    <li><a href="../">Home</a></li>
    <li><a href="#hero">Games</a></li>
    <li><a href="#archive">Studio</a></li>
    <li><a href="../privacypolicy_ChaseChaos/">Privacy Policy</a></li>
  </ul>
  <a href="#grid" class="nav-cta">View Games</a>
</nav>
<section class="hero" id="hero">
  <div class="hero-top">
    <div class="brand">META<span>ACHIEVERS</span></div>
  </div>

  <!-- slides injected by JS -->
  <div id="slideContainer"></div>

  <div class="hero-overlay">
    <div class="hero-info">
      <div class="hero-eyebrow"><span class="num" id="slideIndex">01</span> / 05 — Featured Release</div>
      <h1 class="hero-title" id="slideTitle">Title</h1>
      <p class="hero-desc" id="slideDesc">Description</p>
      <a class="play-btn" id="slideLink" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 20.5v-17c0-.59.34-1.11.83-1.37l13.69 9.37-13.69 9.37c-.49-.26-.83-.78-.83-1.37z"/><path d="M17.5 12.5l-4.6-3.15L6.3 4.07l11.2 7.66zm0-1l4.39-3a1.5 1.5 0 0 0 0-2.5l-4.39-3-4.6 3.15zm0 1l-4.6 3.15 4.6 3.15 4.39-3a1.5 1.5 0 0 0 0-2.5z"/></svg>
        Get it on Play Store
      </a>
    </div>
    <div class="hero-dots" id="dotContainer"></div>
  </div>

  <div class="scroll-cue">Scroll for all projects</div>
</section>

<!-- ============ ARCHIVE GRID ============ -->
<section class="archive">
  <div class="archive-head">
    <h2>Full Catalog</h2>
    <div class="archive-count" id="catalogCount">00 Titles</div>
  </div>
  <div class="grid" id="grid"></div>
</section>

<footer>© 2026 Meta Achievers Studio — Built for play, one tap at a time</footer>

<script>
  // ====== REPLACE THIS DATA WITH YOUR REAL GAMES ======
  const games = [
    {
      title: "PARAKRAM- 2D Tackler Game",
      tagline: "Released",
      desc: "A neon racer through collapsing skylines. Drift, boost, survive the descent.",
      image: "../images/Parakim.jpeg",
      link: "https://play.google.com/store/apps/details?id=com.forge.nightfall"
    },
    {
      title: "Drift Chaos",
      tagline: "Featured Release",
      desc: "A 2D drift game set in a world of collapsing cities and endless night. Tap to boost, drift through chaos.",
      image: "../images/DRIFTCC.png",
      link: "https://play.google.com/store/apps/details?id=com.forge.orchard"
    },
    {
      title: "Real-State Business Simulator",
      tagline: "Featured Release",
      desc: "Steam-powered tactics. Build your crew, arm your airship, take the skies.",
      image: "../images/Realst.jpeg",
      link: "https://play.google.com/store/apps/details?id=com.forge.brassbound"
    },
    {
      title: "Static Hour",
      tagline: "Featured Release",
      desc: "A radio-drama detective game told entirely through sound and choice.",
      image: "https://picsum.photos/seed/statichour/1600/900",
      link: "https://play.google.com/store/apps/details?id=com.forge.statichour"
    },
    {
      title: "Tideglass",
      tagline: "Featured Release",
      desc: "Build floating villages, ride the tide, outlast the storm season.",
      image: "https://picsum.photos/seed/tideglass/1600/900",
      link: "https://play.google.com/store/apps/details?id=com.forge.tideglass"
    },
    {
      title: "Mothlight",
      tagline: "Side Project",
      desc: "A side-scrolling platformer where light is your only weapon against the dark.",
      image: "https://picsum.photos/seed/mothlight/1600/900",
      link: "https://play.google.com/store/apps/details?id=com.forge.mothlight"
    },
    {
      title: "Quarry Run",
      tagline: "Side Project",
      desc: "An endless mining roguelite. Dig deep, sell loot, don't get greedy.",
      image: "https://picsum.photos/seed/quarryrun/1600/900",
      link: "https://play.google.com/store/apps/details?id=com.forge.quarryrun"
    },
    {
      title: "Paperclip Kingdom",
      tagline: "Side Project",
      desc: "An idle strategy game about an office that slowly becomes an empire.",
      image: "https://picsum.photos/seed/paperclip/1600/900",
      link: "https://play.google.com/store/apps/details?id=com.forge.paperclip"
    }
  ];

  const SLIDE_COUNT = Math.min(5, games.length);
  const SLIDE_DURATION = 5000;

  // ---- Build hero slides ----
  const slideContainer = document.getElementById('slideContainer');
  const dotContainer = document.getElementById('dotContainer');

  for (let i = 0; i < SLIDE_COUNT; i++) {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.style.backgroundImage = `url(${games[i].image})`;
    slide.dataset.index = i;
    slideContainer.appendChild(slide);
  }

  const dotRow = document.createElement('div');
  dotRow.className = 'dot-row';
  for (let i = 0; i < SLIDE_COUNT; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.innerHTML = '<div class="fill"></div>';
    dot.addEventListener('click', () => goToSlide(i));
    dotRow.appendChild(dot);
  }
  dotContainer.appendChild(dotRow);
  const dotLabel = document.createElement('div');
  dotLabel.className = 'dot-label';
  dotLabel.textContent = 'Tap to jump';
  dotContainer.appendChild(dotLabel);

  const slideEls = [...document.querySelectorAll('.slide')];
  const dotEls = [...document.querySelectorAll('.dot')];
  const slideIndexEl = document.getElementById('slideIndex');
  const slideTitleEl = document.getElementById('slideTitle');
  const slideDescEl = document.getElementById('slideDesc');
  const slideLinkEl = document.getElementById('slideLink');

  let current = 0;
  let timer = null;

  function renderInfo(i) {
    const g = games[i];
    slideIndexEl.textContent = String(i + 1).padStart(2, '0');
    slideTitleEl.textContent = g.title;
    slideDescEl.textContent = g.desc;
    slideLinkEl.href = g.link;
  }

  function goToSlide(i) {
    slideEls[current].classList.remove('active');
    dotEls[current].classList.remove('active');
    current = i;
    slideEls[current].classList.add('active');
    dotEls[current].classList.add('active');
    renderInfo(current);
    restartTimer();
  }

  function nextSlide() {
    goToSlide((current + 1) % SLIDE_COUNT);
  }

  function restartTimer() {
    if (timer) clearTimeout(timer);
    timer = setTimeout(nextSlide, SLIDE_DURATION);
  }

  renderInfo(0);
  restartTimer();

  // ---- Build archive grid (all games) ----
  const grid = document.getElementById('grid');
  document.getElementById('catalogCount').textContent =
    String(games.length).padStart(2, '0') + ' Titles';

  games.forEach(g => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = g.link;
    card.target = '_blank';
    card.rel = 'noopener';
    card.innerHTML = `
      <img src="${g.image}" alt="${g.title}">
      <div class="card-shade"></div>
      <div class="card-info">
        <div class="card-tag">${g.tagline}</div>
        <div class="card-title">${g.title}</div>
        <div class="card-desc">${g.desc}</div>
        <div class="card-cta">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 20.5v-17c0-.59.34-1.11.83-1.37l13.69 9.37-13.69 9.37c-.49-.26-.83-.78-.83-1.37z"/></svg>
          Open Play Store
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('solid', window.scrollY > 60);
  });
</script>

</body>
</html>
